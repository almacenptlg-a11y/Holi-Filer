<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLI Filer | Procesar PDF "Supermercados Holi SAC"</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* Tema Claro (Por Defecto) */
        :root {
            --bg-body: #f4f7fb;
            --bg-card: #ffffff;
            --bg-alt: #f8fafc;
            --bg-hover: #f1f5f9;
            
            --primary: #1e3c72;
            --primary-grad: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --accent: #00c6ff;
            --accent-grad: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            --success: #11998e;
            --success-grad: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            
            --excel: #217346; 
            --csv: #64748b;   
            
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --border-table: #e2e8f0;
            
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --icon-filter: none;
        }

        /* Tema Oscuro */
        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-alt: #0f172a;
            --bg-hover: #334155;
            
            --primary: #60a5fa;
            --primary-grad: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            --accent: #38bdf8;
            --accent-grad: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            --success: #34d399;
            --success-grad: linear-gradient(135deg, #34d399 0%, #059669 100%);
            
            --excel: #22c55e;
            --csv: #94a3b8;
            
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --border-table: #334155;
            
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            --icon-filter: brightness(0.8);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; transition: background-color 0.3s, border-color 0.3s; }
        body { background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px; }

        .container { max-width: 1280px; margin: 0 auto; }

        /* Header Moderno */
        .header { background: var(--bg-card); padding:10px 30px; border-radius: 16px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-left: 5px solid var(--primary); }
        .header-left { display: flex; flex-direction: column; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .header h1 { margin: 0; font-size: 24px; color: var(--primary); background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 14px; }

        /* Botón Theme Toggle */
        .theme-toggle { background: var(--bg-hover); border: 1px solid var(--border-color); color: var(--text-main); font-size: 20px; cursor: pointer; padding: 8px 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .theme-toggle:hover { transform: scale(1.1); border-color: var(--accent); }

        /* Zona de Carga (Drag & Drop) */
        .upload-zone { background: var(--bg-card); border: 2px dashed var(--border-color); border-radius: 16px; padding: 20px 20px; text-align: center; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow); position: relative; overflow: hidden; margin-bottom: 20px; }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: var(--bg-alt); transform: translateY(-2px); }
        .upload-zone .icon { font-size: 40px; margin-bottom: 15px; filter: var(--icon-filter); }
        .upload-zone p { margin: 0; font-size: 18px; font-weight: 500; color: var(--primary); }
        .upload-zone span { font-size: 13px; color: var(--text-muted); }
        
        /* Botones Profesionales */
        .btn { border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; color: #ffffff; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; filter: grayscale(100%); }
        .btn-primary { background: var(--primary-grad); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(30,60,114,0.3); }
        
        .btn-excel { background: var(--excel); }
        .btn-excel:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(33,115,70,0.3); }
        
        .btn-csv { background: var(--csv); color: #fff; }
        .btn-csv:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(100,116,139,0.3); }

        /* Dashboard de KPIs */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 25px 0; display: none; }
        .kpi-card { background: var(--bg-card); padding: 15px; border-radius: 16px; box-shadow: var(--shadow); border-top: 4px solid var(--accent); }
        .kpi-card.green { border-top-color: var(--success); }
        .kpi-card h3 { margin: 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .kpi-card .value { font-size: 28px; font-weight: 700; color: var(--primary); margin-top: 10px; }

        /* Controles y Filtros */
        .toolbar { background: var(--bg-card); padding: 15px 25px; border-radius: 12px; box-shadow: var(--shadow); display: none; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .toolbar-group { display: flex; align-items: center; gap: 10px; }
        .export-group { display: flex; gap: 10px; }
        select { background: var(--bg-card); padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 14px; color: var(--text-main); outline: none; cursor: pointer; }
        select:focus { border-color: var(--accent); }

        /* Tablas y Acordeones */
        .group-card { background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 15px; overflow: hidden; }
        .group-header { background: var(--bg-alt); padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-table); transition: background 0.2s; }
        .group-header:hover { background: var(--bg-hover); }
        .group-title { font-weight: 600; font-size: 16px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .group-badge { background: var(--accent-grad); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .group-total { font-weight: 700; color: var(--success); }
        
        .table-container { overflow-x: auto; display: none; }
        .table-container.active { display: block; animation: slideDown 0.3s ease; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: var(--bg-card); padding: 12px 20px; text-align: left; color: var(--text-muted); font-weight: 600; border-bottom: 2px solid var(--border-table); }
        td { padding: 12px 20px; border-bottom: 1px solid var(--border-table); color: var(--text-main); }
        tr:hover td { background-color: var(--bg-hover); }
        
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Loader */
        .loader { display: none; text-align: center; padding: 20px; color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <h1>Holi Filer 1.0</h1>
            <p>Procesar PDF "Supermercados Holi SAC"</p>
        </div>
        <div class="header-right">
            <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema">🌙</button>
            <button id="process-btn" class="btn btn-primary" disabled>
                ⚙️ Iniciar Procesamiento
            </button>
        </div>
    </div>

    <div class="upload-zone" id="drop-zone">
        <div class="icon">📄</div>
        <p>Arrastra los pedidos PDF aquí</p>
        <span>o haz clic para explorar tus archivos</span>
        <input type="file" id="file-input" multiple accept=".pdf" style="display:none">
    </div>

    <div class="loader" id="loader">Procesando documentos de alta complejidad...</div>

    <div class="kpi-grid" id="kpi-dashboard">
        <div class="kpi-card">
            <h3>Total Archivos</h3>
            <div class="value" id="kpi-files">0</div>
        </div>
        <div class="kpi-card">
            <h3>Líneas Detalladas Extraídas</h3>
            <div class="value" id="kpi-lines">0</div>
        </div>
        <div class="kpi-card green">
            <h3>Monto Total Soles</h3>
            <div class="value" id="kpi-amount">S/0.00</div>
        </div>
    </div>

    <div class="toolbar" id="toolbar">
        <div class="toolbar-group">
            <span style="font-weight: 600; color: var(--primary);">Vista: Agrupar por</span>
            <select id="group-select">
                <option value="local">📍 Localidad (Destino)</option>
                <option value="order">📦 Número de Orden</option>
            </select>
        </div>
        
        <div class="export-group">
            <button id="export-excel-btn" class="btn btn-excel">
                📗 Excel (.xlsx)
            </button>
            <button id="export-csv-btn" class="btn btn-csv">
                📄 CSV (.csv)
            </button>
        </div>
    </div>

    <div id="data-container"></div>
</div>

<script>
    // --- GESTIÓN DEL TEMA (DARK/LIGHT MODE) ---
    const themeToggle = document.getElementById('theme-toggle');
    const rootElement = document.documentElement;

    // Verificar preferencia guardada
    const savedTheme = localStorage.getItem('theme') || 'light';
    rootElement.setAttribute('data-theme', savedTheme);
    updateThemeIcon(savedTheme);

    themeToggle.addEventListener('click', () => {
        const currentTheme = rootElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        
        rootElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
    });

    function updateThemeIcon(theme) {
        themeToggle.innerText = theme === 'light' ? '🌙' : '☀️';
    }


    // --- LÓGICA DE PROCESAMIENTO ---
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let selectedFiles = [];
    let masterData = []; 

    // DOM Elements
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const processBtn = document.getElementById('process-btn');
    const loader = document.getElementById('loader');
    const kpiDashboard = document.getElementById('kpi-dashboard');
    const toolbar = document.getElementById('toolbar');
    const dataContainer = document.getElementById('data-container');
    const groupSelect = document.getElementById('group-select');

    // Drag & Drop UI Logic
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    };

    function handleFiles(files) {
        selectedFiles = Array.from(files).filter(f => f.type === "application/pdf");
        if(selectedFiles.length > 0) {
            dropZone.querySelector('p').innerText = `${selectedFiles.length} archivos seleccionados`;
            processBtn.disabled = false;
        }
    }

    // Proceso Principal
    processBtn.onclick = async () => {
        masterData = [];
        processBtn.disabled = true;
        loader.style.display = 'block';
        kpiDashboard.style.display = 'none';
        toolbar.style.display = 'none';
        dataContainer.innerHTML = '';
        
        for(let file of selectedFiles) {
            try {
                const lines = await parseDetachedPDF(file);
                masterData.push(...lines);
            } catch(e) {
                console.error("Error en " + file.name, e);
            }
        }
        
        loader.style.display = 'none';
        updateDashboard();
        renderGroupedData();
    };

    // MOTOR COLUMNAR
    async function parseDetachedPDF(file) {
        const buffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
        let fullText = "";

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            fullText += content.items.map(item => item.str.trim()).filter(s => s).join(' ') + " ";
        }
        fullText = fullText.replace(/"/g, '').replace(/\s+/g, ' ');

        const orderMatch = fullText.match(/Pedido de compra\s*#\s*([P0-9]+)/i);
        const order = orderMatch ? orderMatch[1] : "N/A";
        const localMatch = fullText.match(/Para:\s*(H\d+\s+[A-Z0-9\sÁÉÍÓÚÑ]+)/i);
        let local = localMatch ? localMatch[1].split(/(Representante|Cod|Fecha|Un\.)/i)[0].trim() : "N/A";
        const dates = fullText.match(/\d{2}\/\d{2}\/\d{4}/g);
        const date = dates && dates.length > 1 ? dates[1] : (dates ? dates[0] : "N/A");

        const productsRegex = /(775\d{10})\s+(.*?)(?=\s*(?:Unidades|Un\.\s*de\s*Medida|775\d{10}|S\/|Total|Cantidad|Precio|$))/gi;
        let products = [];
        let m;
        while ((m = productsRegex.exec(fullText)) !== null) products.push({ ean: m[1], desc: m[2].trim() });

        const cantidades = [...fullText.matchAll(/\b(\d+\.\d{3})\b/g)].map(x => x[1]);
        const precios = [...fullText.matchAll(/\b(\d+\.\d{5})\b/g)].map(x => x[1]);
        const subtotales = [...fullText.matchAll(/S\/\s*([\d,]+\.\d{2})/g)].map(x => x[1]);

        const results = [];
        for (let i = 0; i < products.length; i++) {
            results.push({
                order, local, date,
                ean: products[i].ean,
                producto: products[i].desc,
                um: 'Unidades',
                qty: cantidades[i] || "0.000",
                price: precios[i] || "0.00000",
                subtotal: subtotales[i] || "0.00",
                numericSubtotal: parseFloat((subtotales[i] || "0").replace(/,/g, ''))
            });
        }
        return results;
    }

    // Dashboard UI
    function updateDashboard() {
        document.getElementById('kpi-files').innerText = selectedFiles.length;
        document.getElementById('kpi-lines').innerText = masterData.length; 
        
        const totalAmount = masterData.reduce((sum, item) => sum + item.numericSubtotal, 0);
        document.getElementById('kpi-amount').innerText = `S/ ${totalAmount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        
        kpiDashboard.style.display = 'grid';
        toolbar.style.display = 'flex';
    }

    groupSelect.addEventListener('change', renderGroupedData);

    function renderGroupedData() {
        dataContainer.innerHTML = '';
        const groupKey = groupSelect.value;
        
        const grouped = masterData.reduce((acc, curr) => {
            const key = curr[groupKey];
            if (!acc[key]) acc[key] = { items: [], total: 0 };
            acc[key].items.push(curr);
            acc[key].total += curr.numericSubtotal;
            return acc;
        }, {});

        for (const [key, data] of Object.entries(grouped)) {
            const card = document.createElement('div');
            card.className = 'group-card';
            
            const totalFormatted = `S/ ${data.total.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            
            card.innerHTML = `
                <div class="group-header" onclick="toggleTable(this)">
                    <div class="group-title">
                        <span>${key === 'N/A' ? 'Desconocido' : key}</span>
                        <span class="group-badge">${data.items.length} líneas</span>
                    </div>
                    <div class="group-total">${totalFormatted} <span>▼</span></div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                ${groupKey === 'local' ? '<th>Orden</th>' : '<th>Local</th>'}
                                <th>Cod. Barras</th>
                                <th>Producto</th>
                                <th>Cant.</th>
                                <th>P. Unit</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.items.map(item => `
                                <tr>
                                    <td>${groupKey === 'local' ? item.order : item.local}</td>
                                    <td><strong>${item.ean}</strong></td>
                                    <td>${item.producto}</td>
                                    <td>${item.qty}</td>
                                    <td>${item.price}</td>
                                    <td>S/ ${item.subtotal}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            dataContainer.appendChild(card);
        }
        
        if(dataContainer.firstChild) {
            toggleTable(dataContainer.firstChild.querySelector('.group-header'));
        }
    }

    function toggleTable(headerElement) {
        const tableContainer = headerElement.nextElementSibling;
        tableContainer.classList.toggle('active');
        const arrow = headerElement.querySelector('.group-total span');
        arrow.innerText = tableContainer.classList.contains('active') ? '▲' : '▼';
    }

    // --- LÓGICA DE EXPORTACIÓN ---

    // 1. Exportación a EXCEL (XLSX)
    document.getElementById('export-excel-btn').onclick = () => {
        if(masterData.length === 0) return;
        
        const exportData = masterData.map(d => ({
            "Orden de Compra": d.order,
            "Local Destino": d.local,
            "Fecha Requerida": d.date,
            "Código de Barras (EAN)": d.ean,
            "Descripción de Producto": d.producto,
            "Unidad Medida": d.um,
            "Cantidad": parseFloat(d.qty),
            "Precio Unitario": parseFloat(d.price),
            "Subtotal (S/)": d.numericSubtotal
        }));

        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Líneas Extraídas");
        XLSX.writeFile(wb, `Reporte_Detallado_Holi_${new Date().getTime()}.xlsx`);
    };

    // 2. Exportación a CSV
    document.getElementById('export-csv-btn').onclick = () => {
        if(masterData.length === 0) return;
        
        const headers = ["ORDEN DE COMPRA", "LOCALIDAD", "FECHA PEDIDO", "SCAN_COD", "PRODUCTO X", "UM", "PEDIDO", "Precio Unitario", "Subtotal"];
        const rows = masterData.map(d => [
            d.order, 
            `"${d.local}"`, 
            d.date, 
            `"${d.ean}"`, 
            `"${d.producto}"`, 
            d.um, 
            d.qty, 
            d.price, 
            d.numericSubtotal
        ]);
        
        const csvContent = [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Holi_Ordenes_Compra_${new Date().getTime()}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    };
</script>

</body>
</html>
